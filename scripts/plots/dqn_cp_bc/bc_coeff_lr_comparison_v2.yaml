  - title: "Eval on CartPole-V2 (BC coeff=1)"
    test_env: V2
    lines:
      - method: "dqn_cp_bc/dqn_cp_bc-b_1-s_<s>-l_000025"
        label: "Adam lr=0.00025"
        color: "#FF9800"
      - method: "dqn_cp_bc/dqn_cp_bc-b_1-s_<s>-l_00005"
        label: "Adam lr=0.0005"
        color: "#2196F3"
      - method: "dqn_cp_bc/dqn_cp_bc-b_1-s_<s>-l_000075"
        label: "Adam lr=0.00075"
        color: "#FF0000"
      - method: "dqn_cp_bc/dqn_cp_bc-b_1-s_<s>-l_0001"
