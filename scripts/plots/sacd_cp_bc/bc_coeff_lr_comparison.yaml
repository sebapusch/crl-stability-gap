        color: "#FF9800"
      - method: "sacd_cp_bc/sacd_cp_bc-l_00005-b_1-s_<s>"
        label: "Adam lr=0.0005"
        color: "#2196F3"
      - method: "sacd_cp_bc/sacd_cp_bc-l_000075-b_1-s_<s>"
