      - method: "sacd_cp_bc/sacd_cp_bc-l_00005-b_04-s_<s>"
        label: "Adam lr=0.0005"
        color: "#2196F3"
      - method: "sacd_cp_bc/sacd_cp_bc-l_000075-b_04-s_<s>"
        label: "Adam lr=0.00075"
        color: "#FF0000"
      - method: "sacd_cp_bc/sacd_cp_bc-l_0001-b_04-s_<s>"
        label: "Adam lr=0.001"
        color: "#4CAF50"

  - title: "Eval on CartPole-V1 (BC coeff=0.7)"
    test_env: V1
    lines:
      - method: "sacd_cp_bc/sacd_cp_bc-l_000025-b_07-s_<s>"
        label: "Adam lr=0.00025"
        color: "#FF9800"
      - method: "sacd_cp_bc/sacd_cp_bc-l_00005-b_07-s_<s>"
        label: "Adam lr=0.0005"
        color: "#2196F3"
      - method: "sacd_cp_bc/sacd_cp_bc-l_000075-b_07-s_<s>"
